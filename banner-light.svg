    <text x="66" y="562" opacity="0"><tspan fill="#c084fc">function</tspan> buildInsights() {<animate attributeName="opacity" from="0" to="1" begin="5.2s" dur="0.3s" fill="freeze"/></text>
    <text x="86" y="586" opacity="0"><tspan fill="#60a5fa">return</tspan> data.clean().analyze().visualize();<animate attributeName="opacity" from="0" to="1" begin="5.5s" dur="0.3s" fill="freeze"/></text>
    <text x="66" y="610" opacity="0">}<animate attributeName="opacity" from="0" to="1" begin="5.8s" dur="0.3s" fill="freeze"/></text>
  </g>
