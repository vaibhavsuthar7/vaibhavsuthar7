    <text x="181" y="316" text-anchor="middle" fill="#6b21a8">JavaScript</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="3.04s" dur="0.4s" fill="freeze"/>
    <rect x="238" y="296" width="102" height="30" rx="15" fill="url(#pillGrad)" stroke="#c084fc" stroke-opacity="0.6"/>
    <text x="289" y="316" text-anchor="middle" fill="#6b21a8">TypeScript</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="3.16s" dur="0.4s" fill="freeze"/>
    <rect x="348" y="296" width="72" height="30" rx="15" fill="url(#pillGrad)" stroke="#c084fc" stroke-opacity="0.6"/>
    <text x="384" y="316" text-anchor="middle" fill="#6b21a8">React</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="3.28s" dur="0.4s" fill="freeze"/>
    <rect x="428" y="296" width="86" height="30" rx="15" fill="url(#pillGrad)" stroke="#c084fc" stroke-opacity="0.6"/>
    <text x="471" y="316" text-anchor="middle" fill="#6b21a8">Node.js</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="3.40s" dur="0.4s" fill="freeze"/>
