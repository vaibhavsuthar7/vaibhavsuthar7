<!-- about me -->
<text x="48" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#6d28d9" opacity="0">
  Final-year Computer Engineering student building AI-driven, data-first products.
  <animate attributeName="opacity" from="0" to="1" begin="4s" dur="0.6s" fill="freeze"/>
</text>
<text x="48" y="434" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#6d28d9" opacity="0">
  Data Analytics Intern @ Navodita Infotech &#183; Deloitte Job Simulation
  <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.6s" fill="freeze"/>
</text>

<!-- stats bar -->
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="4.4s" dur="0.6s" fill="freeze"/>
  <rect x="48" y="456" width="600" height="10" rx="5" fill="#ede4ff"/>
  <rect x="48" y="456" width="0" height="10" rx="5" fill="url(#neonGrad)">
    <animate attributeName="width" from="0" to="540" begin="4.6s" dur="1.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>
  <text x="48" y="486" font-family="Consolas, monospace" font-size="12" fill="#7c3aed">6+ Projects Shipped &#183; 2.56L+ Records Analyzed &#183; 16-Module Platform Architected</text>
</g>

<!-- code editor card -->
<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="4.9s" dur="0.5s" fill="freeze"/>
  <rect x="48" y="510" width="560" height="120" rx="12" fill="#ffffff" stroke="#e9d5ff"/>
  <circle cx="68" cy="530" r="5" fill="#ff5f56"/>
  <circle cx="86" cy="530" r="5" fill="#ffbd2e"/>
  <circle cx="104" cy="530" r="5" fill="#27c93f"/>
