<svg width="1280" height="740" viewBox="0 0 1280 740" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#fdf4ff"/>
    <stop offset="45%" stop-color="#f5e9ff"/>
    <stop offset="100%" stop-color="#fdf2f8"/>
  </linearGradient>

  <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#ff2e88">
      <animate attributeName="stop-color" values="#ff2e88;#a855f7;#ff2e88" dur="4s" repeatCount="indefinite"/>
    </stop>
    <stop offset="50%" stop-color="#c026d3">
      <animate attributeName="stop-color" values="#c026d3;#ec4899;#c026d3" dur="4s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#a855f7">
      <animate attributeName="stop-color" values="#a855f7;#ff2e88;#a855f7" dur="4s" repeatCount="indefinite"/>
    </stop>
  </linearGradient>

  <linearGradient id="pillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#f3e8ff"/>
    <stop offset="100%" stop-color="#fce7f3"/>
  </linearGradient>

  <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#ff2e88"/>
    <stop offset="100%" stop-color="#a855f7"/>
  </linearGradient>

  <radialGradient id="orbGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#a855f7" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="avatarGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ec4899" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.1"/>
  </radialGradient>

  <clipPath id="roundedBanner">
    <rect x="0" y="0" width="1280" height="740" rx="24"/>
  </clipPath>

  <clipPath id="avatarClip">
    <circle cx="1080" cy="185" r="88"/>
  </clipPath>

  <clipPath id="hologramReveal">
    <rect x="990" y="95" width="180" height="0" >
      <animate attributeName="height" from="0" to="185" begin="0.3s" dur="1.6s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      <animate attributeName="y" from="95" to="95" begin="0.3s" dur="1.6s" fill="freeze"/>
    </rect>
  </clipPath>

  <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<g clip-path="url(#roundedBanner)">
<rect x="0" y="0" width="1280" height="740" fill="url(#bgGrad)"/>

<!-- subtle grid -->
<g stroke="#7c3aed" stroke-opacity="0.06" stroke-width="1">
  <line x1="0" y1="120" x2="1280" y2="120"/>
  <line x1="0" y1="260" x2="1280" y2="260"/>
  <line x1="0" y1="400" x2="1280" y2="400"/>
  <line x1="0" y1="540" x2="1280" y2="540"/>
  <line x1="0" y1="640" x2="1280" y2="640"/>
  <line x1="320" y1="0" x2="320" y2="740"/>
  <line x1="640" y1="0" x2="640" y2="740"/>
  <line x1="960" y1="0" x2="960" y2="740"/>
</g>

<!-- ambient orbs -->
<circle cx="150" cy="600" r="160" fill="url(#orbGrad)">
  <animate attributeName="cy" values="600;560;600" dur="7s" repeatCount="indefinite"/>
</circle>
<circle cx="1150" cy="550" r="130" fill="url(#orbGrad)">
  <animate attributeName="cy" values="550;590;550" dur="6s" repeatCount="indefinite"/>
</circle>

<!-- floating particles -->
<g fill="#c026d3">
  <circle cx="80" cy="700" r="2.5" opacity="0.7">
    <animate attributeName="cy" values="700;80;700" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="720" r="2" opacity="0.6">
    <animate attributeName="cy" values="720;60;720" dur="11s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="11s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="710" r="1.8" opacity="0.6">
    <animate attributeName="cy" values="710;40;710" dur="10s" begin="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="10s" begin="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="950" cy="730" r="2.2" opacity="0.6">
    <animate attributeName="cy" values="730;90;730" dur="8s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="8s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1200" cy="700" r="2" opacity="0.6">
    <animate attributeName="cy" values="700;50;700" dur="9.5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="9.5s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- twinkling sparkles -->
<g fill="#7c3aed">
  <circle cx="420" cy="60" r="1.6"><animate attributeName="opacity" values="0.1;1;0.1" dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="780" cy="95" r="1.4"><animate attributeName="opacity" values="0.1;1;0.1" dur="3.1s" begin="0.6s" repeatCount="indefinite"/></circle>
  <circle cx="900" cy="40" r="1.8"><animate attributeName="opacity" values="0.1;1;0.1" dur="2.7s" begin="1.1s" repeatCount="indefinite"/></circle>
  <circle cx="60" cy="180" r="1.5"><animate attributeName="opacity" values="0.1;1;0.1" dur="2.9s" begin="1.6s" repeatCount="indefinite"/></circle>
</g>

<!-- terminal line -->
<text x="48" y="56" font-family="Consolas, 'Courier New', monospace" font-size="17" fill="#059669">
  <tspan>user@dev:~$ </tspan><tspan fill="#4b5563">cat README.md</tspan>
  <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze"/>
</text>
<rect x="288" y="42" width="9" height="18" fill="#059669">
  <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
</rect>

<!-- name, letter by letter -->
<text x="48" y="145" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="url(#nameGrad)" filter="url(#softGlow)">
  <tspan>
    <animate attributeName="opacity" from="0" to="0" begin="0s" dur="0.01s" fill="freeze"/>
  </tspan>
  <tspan opacity="0">V<animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.25s" fill="freeze"/></tspan><tspan opacity="0">A<animate attributeName="opacity" from="0" to="1" begin="0.58s" dur="0.25s" fill="freeze"/></tspan><tspan opacity="0">I<animate attributeName="opacity" from="0" to="1" begin="0.66s" dur="0.25s" fill="freeze"/></tspan><tspan opacity="0">B<animate attributeName="opacity" from="0" to="1" begin="0.74s" dur="0.25s" fill="freeze"/></tspan><tspan opacity="0">H<animate attributeName="opacity" from="0" to="1" begin="0.82s" dur="0.25s" fill="freeze"/></tspan><tspan opacity="0">A<animate attributeName="opacity" from="0" to="1" begin="0.90s" dur="0.25s" fill="freeze"/></tspan><tspan opacity="0">V<animate attributeName="opacity" from="0" to="1" begin="0.98s" dur="0.25s" fill="freeze"/></tspan><tspan opacity="0"> <animate attributeName="opacity" from="0" to="1" begin="1.06s" dur="0.1s" fill="freeze"/></tspan><tspan opacity="0">S<animate attributeName="opacity" from="0" to="1" begin="1.12s" dur="0.25s" fill="freeze"/></tspan><tspan opacity="0">U<animate attributeName="opacity" from="0" to="1" begin="1.20s" dur="0.25s" fill="freeze"/></tspan><tspan opacity="0">T<animate attributeName="opacity" from="0" to="1" begin="1.28s" dur="0.25s" fill="freeze"/></tspan><tspan opacity="0">H<animate attributeName="opacity" from="0" to="1" begin="1.36s" dur="0.25s" fill="freeze"/></tspan><tspan opacity="0">A<animate attributeName="opacity" from="0" to="1" begin="1.44s" dur="0.25s" fill="freeze"/></tspan><tspan opacity="0">R<animate attributeName="opacity" from="0" to="1" begin="1.52s" dur="0.25s" fill="freeze"/></tspan>
</text>

<!-- cycling role titles -->
<g font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#6b21a8">
  <text x="48" y="188" opacity="0">
    Data Analytics Developer
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.02;0.08;0.30;0.36;1" dur="9s" begin="2s" repeatCount="indefinite"/>
  </text>
  <text x="48" y="188" opacity="0">
    Full Stack Developer
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.35;0.38;0.63;0.66;1" dur="9s" begin="2s" repeatCount="indefinite"/>
  </text>
  <text x="48" y="188" opacity="0">
    AI / ML Enthusiast
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.68;0.71;0.98;0.995;1" dur="9s" begin="2s" repeatCount="indefinite"/>
  </text>
</g>

<!-- quote box -->
<rect x="46" y="212" width="620" height="60" rx="10" fill="#ffffff" stroke="#c084fc" stroke-opacity="0.6" opacity="0">
  <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.6s" fill="freeze"/>
</rect>
<text x="66" y="248" font-family="Consolas, monospace" font-size="16" fill="#a21caf" opacity="0">
  "Turning data into decisions, code into products."
  <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.8s" fill="freeze"/>
</text>

<!-- tech pills -->
<g font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.4s" fill="freeze"/>
    <rect x="48" y="296" width="76" height="30" rx="15" fill="url(#pillGrad)" stroke="#c084fc" stroke-opacity="0.6"><animateTransform attributeName="transform" type="scale" additive="sum"/></rect>
    <text x="86" y="316" text-anchor="middle" fill="#6b21a8">Python</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.92s" dur="0.4s" fill="freeze"/>
