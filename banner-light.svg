  </rect>
</g>

<!-- neon sign -->
<text x="48" y="678" font-family="'Brush Script MT', cursive, sans-serif" font-size="30" font-weight="bold" fill="#ff2e88" filter="url(#softGlow)" opacity="0">
  TURNING NUMBERS INTO STORIES ✨
  <animate attributeName="opacity" values="0;0.15;0.9;0.25;1;0.4;1" keyTimes="0;0.1;0.15;0.2;0.3;0.35;1" begin="6s" dur="2.4s" fill="freeze"/>
</text>

<!-- ============ HOLOGRAM AVATAR ============ -->
<circle cx="1080" cy="185" r="98" fill="url(#avatarGlow)" opacity="0">
  <animate attributeName="opacity" from="0" to="0.8" begin="0.3s" dur="1s" fill="freeze"/>
</circle>
<circle cx="1080" cy="185" r="90" fill="none" stroke="url(#neonGrad)" stroke-width="2.5" opacity="0">
  <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.8s" fill="freeze"/>
  <animateTransform attributeName="transform" type="rotate" from="0 1080 185" to="360 1080 185" dur="14s" repeatCount="indefinite"/>
</circle>

<g clip-path="url(#hologramReveal)">
  <g clip-path="url(#avatarClip)">
    <rect x="990" y="95" width="180" height="180" fill="#ffffff"/>
    <text x="1080" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="76" font-weight="700" fill="url(#nameGrad)">VS</text>
  </g>
  <!-- one-time hologram formation scanline -->
  <rect x="990" y="95" width="180" height="4" fill="#059669" opacity="0.9">
    <animate attributeName="y" from="95" to="273" begin="0.3s" dur="1.6s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    <animate attributeName="opacity" from="0.9" to="0" begin="1.7s" dur="0.4s" fill="freeze"/>
  </rect>
</g>

<!-- continuous scanner sweep, clipped to avatar circle -->
<g clip-path="url(#avatarClip)">
  <rect x="990" y="95" width="180" height="14" fill="#ec4899" opacity="0.55">
    <animate attributeName="y" values="95;95;273;273" keyTimes="0;0.02;0.9;1" begin="2.2s" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.55;0.55;0" keyTimes="0;0.05;0.85;1" begin="2.2s" dur="3.5s" repeatCount="indefinite"/>
  </rect>
</g>

<text x="1080" y="304" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#6d28d9" opacity="0">
  vaibhavsuthar7
  <animate attributeName="opacity" from="0" to="1" begin="2s" dur="0.6s" fill="freeze"/>
</text>

</g>

<!-- border -->
<rect x="1.5" y="1.5" width="1277" height="737" rx="22" fill="none" stroke="#e9d5ff" stroke-width="1.5"/>
</svg>
