<svg width="320" height="480" viewBox="0 0 320 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="strapGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#ec4899"/>
    <stop offset="50%" stop-color="#f472b6"/>
    <stop offset="100%" stop-color="#ec4899"/>
  </linearGradient>
  <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#150826"/>
    <stop offset="100%" stop-color="#241143"/>
  </linearGradient>
  <linearGradient id="cardNameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#ff2e88"/>
    <stop offset="100%" stop-color="#a855f7"/>
  </linearGradient>
  <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="45%" stop-color="#ffffff" stop-opacity="0.35"/>
    <stop offset="55%" stop-color="#ffffff" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="avatarRing" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ec4899" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.2"/>
  </radialGradient>
  <clipPath id="cardClip">
    <rect x="-90" y="0" width="180" height="230" rx="16"/>
  </clipPath>
  <clipPath id="badgeAvatarClip">
    <circle cx="0" cy="70" r="42"/>
  </clipPath>
  <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
</defs>

<!-- drop-in entrance + continuous gentle sway, whole assembly -->
<g id="rig">
  <animateTransform attributeName="transform" type="translate"
    values="0,-260; 0,-260; 0,0" keyTimes="0;0.03;0.4"
    dur="1.6s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1;0.3 0 0.2 1"/>

  <g id="pendulum">
    <animateTransform attributeName="transform" type="rotate" attributeType="XML"
      values="0 160 20; 14 160 20; -10 160 20; 6 160 20; -4 160 20; 2 160 20; 0 160 20"
      keyTimes="0;0.16;0.35;0.52;0.68;0.84;1"
      begin="1.4s" dur="1.6s" fill="freeze" calcMode="spline"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>
    <animateTransform attributeName="transform" type="rotate" attributeType="XML" additive="sum"
      values="0 160 20; 2.5 160 20; 0 160 20; -2.5 160 20; 0 160 20"
      keyTimes="0;0.25;0.5;0.75;1"
      begin="3s" dur="6s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

    <!-- strap -->
    <path d="M 150 0 Q 160 60 160 110" stroke="url(#strapGrad)" stroke-width="26" fill="none" stroke-linecap="round"/>
    <text x="160" y="60" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#ffffff" opacity="0.85" transform="rotate(6 160 60)">VAIBHAV &#8226; DEV</text>

    <!-- clasp + ring -->
    <rect x="150" y="104" width="20" height="14" rx="4" fill="#d1d5db"/>
    <circle cx="160" cy="128" r="10" fill="none" stroke="#d1d5db" stroke-width="4"/>

    <!-- card -->
    <g transform="translate(160,132)" filter="url(#dropShadow)">
      <g clip-path="url(#cardClip)">
        <rect x="-90" y="0" width="180" height="230" rx="16" fill="url(#cardGrad)"/>
        <rect x="-90" y="0" width="180" height="46" fill="#0d0620"/>
        <text x="0" y="29" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#f472b6" letter-spacing="2">DEVELOPER ID</text>

        <!-- avatar ring -->
        <circle cx="0" cy="70" r="46" fill="url(#avatarRing)"/>
        <circle cx="0" cy="70" r="46" fill="none" stroke="#f472b6" stroke-width="2">
          <animateTransform attributeName="transform" type="rotate" from="0 0 70" to="360 0 70" dur="10s" repeatCount="indefinite"/>
        </circle>
        <g clip-path="url(#badgeAvatarClip)">
          <rect x="-42" y="28" width="84" height="84" fill="#1c0e38"/>
          <text x="0" y="84" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="700" fill="url(#cardNameGrad)">VS</text>
        </g>

        <text x="0" y="140" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#f5f3ff">VAIBHAV SUTHAR</text>
        <text x="0" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#c4b5fd">Data Analytics &#183; Full Stack Dev</text>
        <text x="0" y="178" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#7ef7c4">@vaibhavsuthar7</text>

        <!-- barcode -->
        <g transform="translate(-60,196)" fill="#a1a1aa">
          <rect x="0" y="0" width="2" height="20"/><rect x="4" y="0" width="1" height="20"/><rect x="7" y="0" width="3" height="20"/>
          <rect x="12" y="0" width="1" height="20"/><rect x="15" y="0" width="2" height="20"/><rect x="19" y="0" width="1" height="20"/>
          <rect x="22" y="0" width="3" height="20"/><rect x="27" y="0" width="1" height="20"/><rect x="30" y="0" width="2" height="20"/>
          <rect x="34" y="0" width="1" height="20"/><rect x="37" y="0" width="3" height="20"/><rect x="42" y="0" width="1" height="20"/>
          <rect x="45" y="0" width="2" height="20"/><rect x="49" y="0" width="1" height="20"/><rect x="52" y="0" width="3" height="20"/>
          <rect x="57" y="0" width="1" height="20"/><rect x="60" y="0" width="2" height="20"/><rect x="64" y="0" width="1" height="20"/>
          <rect x="67" y="0" width="3" height="20"/><rect x="72" y="0" width="1" height="20"/><rect x="75" y="0" width="2" height="20"/>
          <rect x="79" y="0" width="1" height="20"/><rect x="82" y="0" width="3" height="20"/><rect x="87" y="0" width="1" height="20"/>
          <rect x="90" y="0" width="2" height="20"/><rect x="94" y="0" width="1" height="20"/><rect x="97" y="0" width="3" height="20"/>
          <rect x="102" y="0" width="1" height="20"/><rect x="105" y="0" width="2" height="20"/><rect x="109" y="0" width="1" height="20"/>
          <rect x="112" y="0" width="3" height="20"/><rect x="117" y="0" width="1" height="20"/>
        </g>

        <!-- holographic shine sweep -->
        <rect x="-140" y="0" width="60" height="240" fill="url(#shineGrad)" transform="skewX(-20)">
          <animate attributeName="x" values="-140;260" dur="3.2s" begin="2s" repeatCount="indefinite"/>
        </rect>
      </g>
      <rect x="-90" y="0" width="180" height="230" rx="16" fill="none" stroke="#3d1a66" stroke-width="1.5"/>
    </g>
  </g>
</g>
</svg>
